<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="sytle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <section>
      <div class="infos">
        <div class="info card">
          <h3>
            High Score :
            <span id="high-score">0</span>
          </h3>
        </div>
        <div class="info card">
          <h3>
            Score :
            <span id="score">0</span>
          </h3>
        </div>
        <div class="info card-heart">
          <h3 class="heart-container">
            <span class="heart1"><i class="fa-solid fa-heart"></i></span>
            <span class="heart2"><i class="fa-solid fa-heart"></i></span>
            <span class="heart3"><i class="fa-solid fa-heart"></i></span>
          </h3>
        </div>
        <div class="info card">
          <h3>
            Time :
            <span id="time">00:00</span>
          </h3>
        </div>
        <div class="info card">
          <label class="volume-icon" for="volume"><i class="fa-solid fa-volume"></i></label>
          <input type="range" id="volume" min="0" max="100"  value="0.0" />
        </div>
        <div class="info card pause">
          <h3 ><span class="pauseIcon"><i class="fa-solid fa-pause"></i></span></h3>
        </div>
      </div>
      <div class="board"></div>
    </section>
    <div class="modal">
      <div class="start-game">
        <h2>Snake Game</h2>
        <button class="btn btn-start">Start Game</button>
      </div>
      <div class="game-over">
        <h2>Game Over</h2>
        <h2 id="score-card">Your Score is 0</h2>
       
        <button class="btn btn-restart">Restart Game</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
